on:
  push:
      jobs:
          lint:
                 runs-on: ubuntu-latest

                 steps: 
                    - name: Checkout code
                      uses: actions/checkout@v2

                    - name: Setup Node.js
                      uses: actions/setup-node@v4
                      with:
                        node-version: 20

                    - name: Install dependencies
                      run: npm install
                    
                    - name: Check lint
                      run: npm run lint
                    
          test: 
               steps: 
                    - name: Checkout code
                      uses: actions/checkout@v2

                    - name: Setup Node.js
                      uses: actions/setup-node@v4
                      with:
                        node-veersion: 20

                    - name: Install dependencies
                      run: npm install
                    
                    - name: Run tests
                      run: npm test

        summery: 
            runs-on: ubuntu-latest
            needs: [lint, test]

            steps: 
                - name: "Show summary"
                  run: 'echo "Pipeline triggered by" ${{ github.actor }}"'

                - name: lint results
                  run: 'echo "Lint results: ${{ needs.lint.result }}"'

                - name: test results
                  run: 'echo "Test results: ${{ needs.test.result }}"'